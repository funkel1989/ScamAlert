name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ScamAlert.sln

      - name: Build
        run: dotnet build ScamAlert.sln --no-restore -c Release

      - name: Test
        run: dotnet test ScamAlert.sln --no-build -c Release --verbosity normal

  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build desktop MSI
        run: pwsh -File scripts/build-desktop-installer.ps1

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScamAlert-Desktop-msi
          path: installer/ScamAlert.DesktopInstaller/bin/Release/*.msi
