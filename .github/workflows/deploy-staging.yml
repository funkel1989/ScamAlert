name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      deploy_infrastructure:
        description: 'Run Bicep deployment (first time or infra changes)'
        required: false
        default: false
        type: boolean
      resource_group:
        description: 'Azure resource group name'
        required: true
        default: 'rg-scamalert-staging'
      web_app_name:
        description: 'App Service name (Bicep output webAppName; required unless deploying infra in same run)'
        required: false
        default: ''
      alert_email:
        description: 'Email address for monitoring alerts'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_LOCATION: eastus2
  ENVIRONMENT_NAME: staging

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: dotnet restore ScamAlert.sln
      - run: dotnet build ScamAlert.sln -c Release --no-restore
      - run: dotnet test ScamAlert.sln -c Release --no-build --verbosity normal

      - name: Publish API
        run: dotnet publish src/ScamAlert.Api/ScamAlert.Api.csproj -c Release -o artifacts/publish/api

      - uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: artifacts/publish/api/

  deploy-infrastructure:
    if: ${{ inputs.deploy_infrastructure }}
    runs-on: ubuntu-latest
    needs: build-test
    environment: staging
    outputs:
      web_app_name: ${{ steps.infra.outputs.web_app_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: az group create --name "${{ inputs.resource_group }}" --location "${{ env.AZURE_LOCATION }}"

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ inputs.resource_group }}
          template: ./infra/main.bicep
          parameters: >
            environmentName=${{ env.ENVIRONMENT_NAME }}
            location=${{ env.AZURE_LOCATION }}
            sqlAdminLogin=${{ secrets.SQL_ADMIN_LOGIN }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
            alertEmailAddress=${{ inputs.alert_email || secrets.ALERT_EMAIL_ADDRESS }}

      - name: Capture outputs
        id: infra
        run: |
          DEPLOY_NAME=$(az deployment group list -g "${{ inputs.resource_group }}" --query "sort_by(@, &properties.timestamp)[-1].name" -o tsv)
          WEB_APP=$(az deployment group show -g "${{ inputs.resource_group }}" -n "$DEPLOY_NAME" --query "properties.outputs.webAppName.value" -o tsv)
          echo "web_app_name=$WEB_APP" >> "$GITHUB_OUTPUT"
          echo "Deployed App Service: $WEB_APP"

  deploy-app:
    runs-on: ubuntu-latest
    needs: [build-test, deploy-infrastructure]
    if: ${{ always() && needs.build-test.result == 'success' && (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped') }}
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: artifacts/publish/api

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve web app name
        id: app
        env:
          INPUT_NAME: ${{ inputs.web_app_name }}
          INFRA_NAME: ${{ needs.deploy-infrastructure.outputs.web_app_name }}
          SECRET_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
        run: |
          NAME="$INPUT_NAME"
          if [ -z "$NAME" ]; then NAME="$INFRA_NAME"; fi
          if [ -z "$NAME" ]; then NAME="$SECRET_NAME"; fi
          if [ -z "$NAME" ]; then
            echo "::error::Provide web_app_name input, deploy infrastructure in this run, or set AZURE_WEBAPP_NAME secret."
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Zip and deploy
        run: |
          cd artifacts/publish/api
          zip -r ../../../api.zip .
          az webapp deploy \
            --resource-group "${{ inputs.resource_group }}" \
            --name "${{ steps.app.outputs.name }}" \
            --src-path ../../../api.zip \
            --type zip \
            --async false
